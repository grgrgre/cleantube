<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body { width: 260px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 12px; margin: 0; background: #f9f9f9; color: #333; }
      h3 { margin-top: 0; margin-bottom: 12px; font-size: 14px; color: #111; }
      .field { margin-bottom: 10px; }
      label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; color: #666; }
      input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
      input:focus { border-color: #0084ff; outline: none; }
      button { width: 100%; padding: 10px; background: #0084ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; margin-top: 4px; }
      button:hover { background: #0066cc; }
    </style>
  </head>
  <body>
    <h3>CleanTube Config</h3>
    
    <div class="field">
      <label for="apiKeyInput">Smart Engine Key</label>
      <input type="password" id="apiKeyInput" placeholder="Paste Gemini API Key">
    </div>

    <div class="field">
      <label for="topicInput">Focus Topic</label>
      <input type="text" id="topicInput" placeholder="e.g., Rust, Cooking, Finance">
    </div>

    <button id="saveBtn">Activate Shield</button>

    <script src="popup.js"></script>
  </body>
</html>
